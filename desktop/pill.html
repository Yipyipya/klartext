<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding-bottom: 10px;
  }
  /* Live-Mitschrift über der Pill */
  #preview {
    display: none;
    max-width: 480px;
    max-height: 96px;
    overflow: hidden;
    background: rgba(26, 26, 26, 0.94);
    color: #f4eee1;
    border: 1px solid rgba(255, 169, 70, 0.25);
    border-radius: 18px;
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.45;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }
  #preview.visible { display: block; }
  #preview .interim { color: #b7ac9b; }
  #pill {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1a1a;
    color: #f4eee1;
    border: 2px solid rgba(255, 169, 70, 0.35);
    border-radius: 999px;
    padding: 10px 18px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
  }
  #dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ffa946;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    50% { opacity: 0.35; }
  }
  canvas { width: 130px; height: 26px; }
  #timer {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    min-width: 34px;
    text-align: center;
  }
  #status {
    font-size: 12px;
    color: #b7ac9b;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .processing #dot { background: #e3c2fa; animation: none; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="preview"></div>
    <div id="pill">
      <span id="dot"></span>
      <canvas id="wave"></canvas>
      <span id="timer">0:00</span>
      <span id="status">Aufnahme …</span>
    </div>
  </div>

<script type="module">
  const statusEl = document.getElementById("status");
  const timerEl = document.getElementById("timer");
  const pillEl = document.getElementById("pill");
  const previewEl = document.getElementById("preview");
  const canvas = document.getElementById("wave");

  const SAMPLE_RATE = 16000;
  const LIVE_WINDOW_S = 28;   // Whisper-Fenster für die Live-Vorschau
  const LIVE_MIN_S = 1.2;     // erst ab so viel Audio lostranskribieren

  /* ---------- Whisper laden (einmalig pro Modell, wird gecacht) ---------- */
  const MODELS = {
    genau: "onnx-community/whisper-small",
    schnell: "onnx-community/whisper-base",
  };
  let currentModelId = MODELS.genau;
  let transcriberPromise = null;
  let transcriberReady = false;
  let loadedModel = "";

  function getTranscriber(modelId) {
    if (loadedModel !== modelId) {
      transcriberPromise = null;
      transcriberReady = false;
      loadedModel = modelId;
    }
    if (!transcriberPromise) {
      transcriberPromise = (async () => {
        const { pipeline } = await import(
          "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0/+esm"
        );
        const progress_callback = (p) => {
          if (p.status === "progress" && p.file?.endsWith(".onnx")) {
            statusEl.textContent = `Modell lädt … ${Math.round(p.progress ?? 0)} %`;
          }
        };
        let t;
        try {
          if (!navigator.gpu) throw new Error("kein WebGPU");
          t = await pipeline("automatic-speech-recognition", modelId, {
            device: "webgpu",
            dtype: { encoder_model: "fp32", decoder_model_merged: "q4" },
            progress_callback,
          });
        } catch {
          t = await pipeline("automatic-speech-recognition", modelId, {
            device: "wasm",
            dtype: "q8",
            progress_callback,
          });
        }
        transcriberReady = true;
        return t;
      })();
      transcriberPromise.catch(() => {
        transcriberPromise = null;
        transcriberReady = false;
      });
    }
    return transcriberPromise;
  }
  // Kein Vorladen beim App-Start: das Modell (~250 MB) wird erst beim ersten
  // Diktat geladen und danach gecacht. So bleibt die App im Leerlauf schlank.

  /* ---------- sanftes Aufräumen (wie Web-App, Stufe „sanft") ---------- */
  const FILLER_DE = /(^|[\s,„("'-])(?:ähm+|ähh+|äh+|ehm+|öhm+|hmm+|mhm+)(?=[\s.,!?:;…)"'-]|$)/gi;
  const FILLER_EN = /(^|[\s,("'-])(?:um+|uh+|uhm+|erm+|hmm+|mhm+)(?=[\s.,!?:;…)"'-]|$)/gi;
  function clean(text, lang) {
    const t = text
      .replace(lang === "en" ? FILLER_EN : FILLER_DE, "$1")
      .replace(/\s+([,.!?;:…])/g, "$1")
      .replace(/\s{2,}/g, " ")
      .trim();
    return t.replace(/(^|[.!?…]\s+)(\p{Ll})/gu, (_m, p, c) => p + c.toUpperCase());
  }

  /* ---------- Zustand ---------- */
  let stream = null, actx = null, procNode = null;
  let pcmChunks = [];        // Float32Array-Stücke mit 16 kHz mono
  let totalSamples = 0;
  let recordingActive = false, cancelled = false, currentLang = "de";
  let startedAt = 0, timerIv = 0, raf = 0, liveIv = 0, liveBusy = false;

  function concatPcm(fromSample = 0) {
    const out = new Float32Array(totalSamples - fromSample);
    let pos = 0, skipped = 0;
    for (const c of pcmChunks) {
      if (skipped + c.length <= fromSample) { skipped += c.length; continue; }
      const start = Math.max(0, fromSample - skipped);
      out.set(start ? c.subarray(start) : c, pos);
      pos += c.length - start;
      skipped += c.length;
    }
    return out;
  }

  function drawWave(analyser) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const bars = 24;
    const loop = () => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (canvas.width !== w * dpr) { canvas.width = w * dpr; canvas.height = h * dpr; }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);
      analyser.getByteFrequencyData(data);
      ctx.fillStyle = "#ffa946";
      const gap = 3, bw = Math.max(2, (w - gap * (bars - 1)) / bars);
      for (let i = 0; i < bars; i++) {
        const v = data[Math.floor((i / bars) * data.length * 0.7)] / 255;
        const bh = Math.max(3, v * h);
        ctx.beginPath();
        ctx.roundRect(i * (bw + gap), (h - bh) / 2, bw, bh, bw / 2);
        ctx.fill();
      }
      raf = requestAnimationFrame(loop);
    };
    loop();
  }

  function setPreview(text, truncated) {
    if (!text) {
      previewEl.classList.remove("visible");
      previewEl.innerHTML = "";
      return;
    }
    previewEl.classList.add("visible");
    previewEl.innerHTML = "";
    const span = document.createElement("span");
    span.className = "interim";
    span.textContent = (truncated ? "… " : "") + text;
    previewEl.appendChild(span);
    previewEl.scrollTop = previewEl.scrollHeight;
  }

  function resetUI() {
    cancelAnimationFrame(raf);
    clearInterval(timerIv);
    clearInterval(liveIv);
    timerEl.textContent = "0:00";
    statusEl.textContent = "Aufnahme …";
    pillEl.classList.remove("processing");
    setPreview("");
  }

  function stopCapture() {
    procNode?.disconnect();
    procNode = null;
    stream?.getTracks().forEach((t) => t.stop());
    stream = null;
    actx?.close().catch(() => {});
    actx = null;
  }

  /* ---------- Live-Vorschau: alle 1,5 s den Puffer transkribieren ---------- */
  async function liveTick() {
    if (liveBusy || !recordingActive || !transcriberReady) return;
    if (totalSamples < SAMPLE_RATE * LIVE_MIN_S) return;
    liveBusy = true;
    try {
      const windowSamples = SAMPLE_RATE * LIVE_WINDOW_S;
      const truncated = totalSamples > windowSamples;
      const pcm = concatPcm(truncated ? totalSamples - windowSamples : 0);
      const t = await getTranscriber(currentModelId);
      const out = await t(pcm, {
        language: currentLang || undefined,
        task: "transcribe",
      });
      const text = (Array.isArray(out) ? out.map((o) => o.text).join(" ") : out.text) ?? "";
      if (recordingActive) setPreview(text.trim(), truncated);
    } catch {
      /* Vorschau-Durchlauf fehlgeschlagen – nächster Tick versucht es erneut */
    } finally {
      liveBusy = false;
    }
  }

  /* ---------- Start / Stopp / Abbrechen ---------- */
  window.klartext.onStart(async (settings) => {
    cancelled = false;
    recordingActive = true;
    pcmChunks = [];
    totalSamples = 0;
    currentLang = settings?.lang ?? "de";
    currentModelId = MODELS[settings?.model] ?? MODELS.genau;
    resetUI();

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      recordingActive = false;
      window.klartext.error("Kein Mikrofonzugriff");
      return;
    }

    // Direkt als 16-kHz-PCM aufnehmen – daraus speist sich Live-Vorschau UND Endergebnis
    actx = new AudioContext({ sampleRate: SAMPLE_RATE });
    const src = actx.createMediaStreamSource(stream);
    const analyser = actx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.75;
    src.connect(analyser);

    procNode = actx.createScriptProcessor(4096, 1, 1);
    procNode.onaudioprocess = (e) => {
      if (!recordingActive) return;
      const c = new Float32Array(e.inputBuffer.getChannelData(0));
      pcmChunks.push(c);
      totalSamples += c.length;
    };
    const mute = actx.createGain();
    mute.gain.value = 0; // ScriptProcessor braucht eine Verbindung, aber kein Echo
    src.connect(procNode);
    procNode.connect(mute);
    mute.connect(actx.destination);

    drawWave(analyser);
    startedAt = Date.now();
    timerIv = setInterval(() => {
      const s = Math.floor((Date.now() - startedAt) / 1000);
      timerEl.textContent = `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }, 400);
    liveIv = setInterval(liveTick, 1500);
    getTranscriber(currentModelId).catch(() => {});
  });

  window.klartext.onPolishStart(() => {
    pillEl.classList.add("processing");
    statusEl.textContent = "Feinschliff …";
  });

  window.klartext.onStop(async () => {
    if (!recordingActive) return;
    recordingActive = false;
    clearInterval(liveIv);
    cancelAnimationFrame(raf);
    clearInterval(timerIv);
    stopCapture();

    pillEl.classList.add("processing");
    statusEl.textContent = "Finalisiere …";
    try {
      // Laufenden Live-Durchlauf ausklingen lassen
      while (liveBusy) await new Promise((r) => setTimeout(r, 60));
      if (cancelled) return;
      if (totalSamples < SAMPLE_RATE * 0.4) {
        window.klartext.result("");
        return;
      }
      const t = await getTranscriber(currentModelId);
      const out = await t(concatPcm(0), {
        chunk_length_s: 30,
        stride_length_s: 5,
        language: currentLang || undefined,
        task: "transcribe",
      });
      const raw = (Array.isArray(out) ? out.map((o) => o.text).join(" ") : out.text) ?? "";
      window.klartext.result(clean(raw.trim(), currentLang));
    } catch (err) {
      window.klartext.error(String(err?.message ?? err));
    } finally {
      pcmChunks = [];
      totalSamples = 0;
      resetUI();
    }
  });

  window.klartext.onCancel(() => {
    cancelled = true;
    recordingActive = false;
    stopCapture();
    pcmChunks = [];
    totalSamples = 0;
    resetUI();
  });
</script>
</body>
</html>
