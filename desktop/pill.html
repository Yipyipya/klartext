<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #pill {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1a1a;
    color: #f4eee1;
    border: 2px solid rgba(255, 169, 70, 0.35);
    border-radius: 999px;
    padding: 10px 18px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
  }
  #dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ffa946;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    50% { opacity: 0.35; }
  }
  canvas { width: 130px; height: 26px; color: #ffa946; }
  #timer {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    min-width: 34px;
    text-align: center;
  }
  #status {
    font-size: 12px;
    color: #b7ac9b;
    max-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .processing #dot { background: #e3c2fa; animation: none; }
</style>
</head>
<body>
  <div id="pill">
    <span id="dot"></span>
    <canvas id="wave"></canvas>
    <span id="timer">0:00</span>
    <span id="status">Aufnahme …</span>
  </div>

<script type="module">
  const statusEl = document.getElementById("status");
  const timerEl = document.getElementById("timer");
  const pillEl = document.getElementById("pill");
  const canvas = document.getElementById("wave");

  // Whisper (transformers.js) einmalig laden und cachen – Modelldateien
  // landen im Browser-Cache der App und sind danach offline verfügbar.
  let transcriberPromise = null;
  function getTranscriber() {
    if (!transcriberPromise) {
      transcriberPromise = (async () => {
        const { pipeline } = await import(
          "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0/+esm"
        );
        const progress_callback = (p) => {
          if (p.status === "progress" && p.file?.endsWith(".onnx")) {
            statusEl.textContent = `Modell lädt … ${Math.round(p.progress ?? 0)} %`;
          }
        };
        try {
          if (!navigator.gpu) throw new Error("kein WebGPU");
          return await pipeline("automatic-speech-recognition", "onnx-community/whisper-base", {
            device: "webgpu",
            dtype: { encoder_model: "fp32", decoder_model_merged: "q4" },
            progress_callback,
          });
        } catch {
          return await pipeline("automatic-speech-recognition", "onnx-community/whisper-base", {
            device: "wasm",
            dtype: "q8",
            progress_callback,
          });
        }
      })();
      transcriberPromise.catch(() => (transcriberPromise = null));
    }
    return transcriberPromise;
  }

  /* ---------- sanftes Aufräumen (wie Web-App, Stufe „sanft") ---------- */
  const FILLER_DE = /(^|[\s,„("'-])(?:ähm+|ähh+|äh+|ehm+|öhm+|hmm+|mhm+)(?=[\s.,!?:;…)"'-]|$)/gi;
  const FILLER_EN = /(^|[\s,("'-])(?:um+|uh+|uhm+|erm+|hmm+|mhm+)(?=[\s.,!?:;…)"'-]|$)/gi;
  function clean(text, lang) {
    let t = text
      .replace(lang === "en" ? FILLER_EN : FILLER_DE, "$1")
      .replace(/\s+([,.!?;:…])/g, "$1")
      .replace(/\s{2,}/g, " ")
      .trim();
    return t.replace(/(^|[.!?…]\s+)(\p{Ll})/gu, (_m, p, c) => p + c.toUpperCase());
  }

  /* ---------- Aufnahme ---------- */
  let stream = null, recorder = null, chunks = [], startedAt = 0, timerIv = 0, raf = 0, actx = null;
  let cancelled = false, currentLang = "de";

  function drawWave(analyser) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const bars = 24;
    const loop = () => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (canvas.width !== w * dpr) { canvas.width = w * dpr; canvas.height = h * dpr; }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);
      analyser.getByteFrequencyData(data);
      ctx.fillStyle = "#ffa946";
      const gap = 3, bw = Math.max(2, (w - gap * (bars - 1)) / bars);
      for (let i = 0; i < bars; i++) {
        const v = data[Math.floor((i / bars) * data.length * 0.7)] / 255;
        const bh = Math.max(3, v * h);
        ctx.beginPath();
        ctx.roundRect(i * (bw + gap), (h - bh) / 2, bw, bh, bw / 2);
        ctx.fill();
      }
      raf = requestAnimationFrame(loop);
    };
    loop();
  }

  function resetUI() {
    cancelAnimationFrame(raf);
    clearInterval(timerIv);
    timerEl.textContent = "0:00";
    statusEl.textContent = "Aufnahme …";
    pillEl.classList.remove("processing");
  }

  function stopStream() {
    stream?.getTracks().forEach((t) => t.stop());
    stream = null;
    actx?.close().catch(() => {});
    actx = null;
  }

  window.klartext.onStart(async (settings) => {
    cancelled = false;
    chunks = [];
    currentLang = settings?.lang ?? "de";
    resetUI();
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      window.klartext.error("Kein Mikrofonzugriff");
      return;
    }
    actx = new AudioContext();
    const analyser = actx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.75;
    actx.createMediaStreamSource(stream).connect(analyser);
    drawWave(analyser);

    startedAt = Date.now();
    timerIv = setInterval(() => {
      const s = Math.floor((Date.now() - startedAt) / 1000);
      timerEl.textContent = `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }, 400);

    recorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    recorder.ondataavailable = (e) => e.data.size && chunks.push(e.data);
    recorder.onstop = onRecorderStop;
    recorder.start(250);

    // Modell im Hintergrund schon mal laden (parallel zur Aufnahme)
    getTranscriber().catch(() => {});
  });

  window.klartext.onStop(() => {
    if (recorder?.state === "recording") recorder.stop();
  });

  window.klartext.onCancel(() => {
    cancelled = true;
    if (recorder?.state === "recording") recorder.stop();
    stopStream();
    resetUI();
  });

  async function onRecorderStop() {
    stopStream();
    cancelAnimationFrame(raf);
    clearInterval(timerIv);
    if (cancelled) return;

    pillEl.classList.add("processing");
    statusEl.textContent = "Transkribiere …";
    try {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const buf = await blob.arrayBuffer();
      const dctx = new AudioContext({ sampleRate: 16000 });
      const audio = await dctx.decodeAudioData(buf);
      let pcm;
      if (audio.numberOfChannels === 1) pcm = audio.getChannelData(0);
      else {
        pcm = new Float32Array(audio.length);
        for (let c = 0; c < audio.numberOfChannels; c++) {
          const d = audio.getChannelData(c);
          for (let i = 0; i < audio.length; i++) pcm[i] += d[i] / audio.numberOfChannels;
        }
      }
      dctx.close();

      const transcriber = await getTranscriber();
      const out = await transcriber(pcm, {
        chunk_length_s: 30,
        stride_length_s: 5,
        language: currentLang || undefined,
        task: "transcribe",
      });
      const raw = (Array.isArray(out) ? out.map((o) => o.text).join(" ") : out.text) ?? "";
      window.klartext.result(clean(raw.trim(), currentLang));
    } catch (err) {
      window.klartext.error(String(err?.message ?? err));
    } finally {
      resetUI();
    }
  }
</script>
</body>
</html>
